<!DOCTYPE html>
<html>
<head>
<title>Fruits - KLM Freshmart</title>
<style>
body{text-align:center;font-family:Arial;background:#fff0f5}
table{margin:auto;border-collapse:collapse}
th{background:#ff7e5f;color:white;padding:5px}
td{padding:5px;text-align:center}
input[type=number]{width:50px}
</style>
</head>
<body>
<h1>Fruits 🍎</h1>
<table border="1">
<tr><th>Fruit</th><th>Qty (kg)</th><th>Price (₹)</th><th></th></tr>
<tbody id="t"></tbody>
</table>
<h2>Cart</h2>
<div id="c"></div>
<script>
let cart=[],f=[{n:"Apple",p:60},{n:"Banana",p:30},{n:"Orange",p:50},{n:"Mango",p:120},{n:"Pineapple",p:80},{n:"Grapes",p:90},{n:"Papaya",p:70},{n:"Strawberry",p:150},{n:"Blueberry",p:200},{n:"Watermelon",p:40},{n:"Kiwi",p:130},{n:"Guava",p:60},{n:"Litchi",p:140},{n:"Cherry",p:220},{n:"Pear",p:100},{n:"Peach",p:120},{n:"Plum",p:90},{n:"Pomegranate",p:100},{n:"Fig",p:200},{n:"Apricot",p:180},{n:"Cantaloupe",p:80},{n:"Raspberry",p:220},{n:"Blackberry",p:200},{n:"Tangerine",p:70},{n:"Dragonfruit",p:250}];
let t=document.getElementById('t');
f.forEach(x=>{
let tr=document.createElement('tr');
let td1=document.createElement('td'); td1.innerText=x.n; tr.appendChild(td1);
let td2=document.createElement('td'); let inp=document.createElement('input'); inp.type='number'; inp.value=0.5; inp.min=0.5; inp.step=0.5; td2.appendChild(inp); tr.appendChild(td2);
let td3=document.createElement('td'); td3.innerText=x.p*inp.value; tr.appendChild(td3);
inp.oninput=()=>td3.innerText=x.p*inp.value;
let td4=document.createElement('td'); let btn=document.createElement('button'); btn.innerText='Add'; btn.onclick=()=>{cart.push({name:x.n,qty:inp.value,price:x.p*inp.value});updateCart();}; td4.appendChild(btn); tr.appendChild(td4);
t.appendChild(tr);
});
function updateCart(){let h='<table border="1" style="margin:auto"><tr><th>Item</th><th>Qty</th><th>Price</th></tr>'; cart.forEach(i=>h+=<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td></tr>); h+='</table>'; document.getElementById('c').innerHTML=h;}
</script>
</body>
</html>
