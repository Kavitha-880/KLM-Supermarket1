<!DOCTYPE html>
<html>
<head>
<title>Vegetables - KLM Freshmart</title>
<style>body{text-align:center;font-family:Arial;background:#d0ffd0}table{margin:auto;border-collapse:collapse}th{background:#32cd32;color:white;padding:5px}td{padding:5px;text-align:center}input{width:50px}</style>
</head>
<body>
<h1>Vegetables 🥦</h1>
<table border="1"><tr><th>Veg</th><th>Qty</th><th>Price</th><th></th></tr><tbody id="t"></tbody></table>
<h2>Cart</h2><div id="c"></div>
<script>
let c=[],v=[{n:"Potato",p:25},{n:"Tomato",p:40},{n:"Onion",p:35},{n:"Carrot",p:60},{n:"Cabbage",p:30},{n:"Cauliflower",p:50},{n:"Spinach",p:20},{n:"Beetroot",p:55},{n:"Capsicum",p:80},{n:"Broccoli",p:120},{n:"Brinjal",p:45},{n:"Cucumber",p:25},{n:"Radish",p:20},{n:"Green Peas",p:70},{n:"Bottle Gourd",p:30},{n:"Bitter Gourd",p:50},{n:"Okra",p:60},{n:"Sweet Corn",p:90},{n:"Pumpkin",p:35},{n:"Mushroom",p:150},{n:"Fenugreek Leaves",p:25},{n:"Coriander Leaves",p:20},{n:"Lettuce",p:100},{n:"Drumstick",p:45},{n:"Yam",p:60}];
let t=document.getElementById('t');
v.forEach(x=>{let tr=document.createElement('tr');let td1=document.createElement('td');td1.innerText=x.n;tr.appendChild(td1);
let td2=document.createElement('td');let inp=document.createElement('input');inp.type='number';inp.value=0.5;inp.min=0.5;inp.step=0.5;td2.appendChild(inp);tr.appendChild(td2);
let td3=document.createElement('td');td3.innerText=x.p*inp.value;tr.appendChild(td3);
inp.oninput=()=>td3.innerText=x.p*inp.value;
let td4=document.createElement('td');let btn=document.createElement('button');btn.innerText='Add';btn.onclick=()=>{c.push({name:x.n,qty:inp.value,price:x.p*inp.value});upd();};td4.appendChild(btn);tr.appendChild(td4);
t.appendChild(tr);});
  function upd(){
 let total=0;
 let h='<table border="1" style="margin:auto"><tr><th>Item</th><th>Qty</th><th>Price</th></tr>';
 c.forEach(i=>{h+=`<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td></tr>`; total+=+i.price;});
 h+=`</table><h3>Total: ₹${total}</h3>
 <button onclick="goPay(${total})">Proceed to Payment</button>`;
 document.getElementById('c').innerHTML=h;
}
function goPay(t){localStorage.setItem("total",t);window.location="payment.html";}
</script>
</body>
</html>
