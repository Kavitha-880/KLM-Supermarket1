<!DOCTYPE html>
<html>
<head>
<title>Fruits - KLM Freshmart</title>
<style>
body{text-align:center;font-family:Arial;background:#fff0f5}
table{margin:auto;border-collapse:collapse}
th{background:#ff7e5f;color:white;padding:5px}
td{padding:5px;text-align:center}
input{width:50px}
</style>
</head>
<body>

<h1>Fruits 🍎</h1>

<table border="1">
<tr><th>Fruit</th><th>Qty</th><th>Price</th><th></th></tr>
<tbody id="t"></tbody>
</table>

<h2>Cart</h2>
<div id="c"></div>

<script>
let c=[];

let f=[
["Apple",60],["Banana",30],["Orange",50],["Mango",120],["Pineapple",80],
["Grapes",90],["Papaya",70],["Strawberry",150],["Blueberry",200],["Watermelon",40],
["Kiwi",130],["Guava",60],["Litchi",140],["Cherry",220],["Pear",100],
["Peach",120],["Plum",90],["Pomegranate",100],["Fig",200],["Apricot",180],
["Cantaloupe",80],["Raspberry",220],["Blackberry",200],["Tangerine",70],["Dragonfruit",250]
];

let t=document.getElementById("t");

f.forEach(x=>{
let tr=document.createElement("tr");

tr.innerHTML=
`<td>${x[0]}</td>
<td><input type="number" value="0.5" min="0.5" step="0.5"></td>
<td>${x[1]*0.5}</td>
<td><button>Add</button></td>`;

let inp=tr.children[1].children[0];
let priceCell=tr.children[2];

inp.oninput=()=>priceCell.innerText=x[1]*inp.value;

tr.children[3].children[0].onclick=()=>{
c.push({name:x[0],qty:inp.value,price:x[1]*inp.value});
upd();
};

t.appendChild(tr);
});

function upd(){
let total=0;
let h='<table border="1" style="margin:auto"><tr><th>Item</th><th>Qty</th><th>Price</th></tr>';

c.forEach(i=>{
h+=`<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td></tr>`;
total+=+i.price;
});

h+=`</table><h3>Total: ₹${total}</h3>
<button onclick="goPay(${total})">Proceed to Payment</button>`;

document.getElementById("c").innerHTML=h;
}

function goPay(t){
localStorage.setItem("total",t);
window.location="payment.html";
}
</script>

</body>
</html>
