<!DOCTYPE html>
<html>
<head>
    <title>KLM Supermarket - Payment</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #ff4b5c;
        }

        .amount {
            text-align: center;
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
        }

        .payment-method {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
            margin: 8px 0;
            cursor: pointer;
        }

        .payment-method:hover {
            background: #ffe0e6;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .section {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
        }

        #upi {
            background: #e3f2fd;
        }

        #card {
            background: #e8f5e9;
        }

        #netbanking {
            background: #fff3e0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .hidden {
            display: none;
        }

        #successMsg {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>KLM Supermarket Payment</h2>

    <div class="amount">Total Amount: ₹500</div>

    <!-- Payment Options -->
    <div class="payment-method">
        <input type="radio" name="payment" onclick="showOption('upi')"> UPI Payment
    </div>

    <div class="payment-method">
        <input type="radio" name="payment" onclick="showOption('card')"> Card Payment
    </div>

    <div class="payment-method">
        <input type="radio" name="payment" onclick="showOption('netbanking')"> Net Banking
    </div>

    <!-- UPI -->
    <div id="upi" class="section hidden">
        <label>Enter UPI ID:</label>
        <input type="text" placeholder="example@upi">
    </div>

    <!-- Card -->
    <div id="card" class="section hidden">
        <label>Card Number:</label>
        <input type="text" placeholder="XXXX XXXX XXXX XXXX">

        <label>Expiry Date:</label>
        <input type="month">

        <label>CVV:</label>
        <input type="password" placeholder="123">
    </div>

    <!-- Net Banking -->
    <div id="netbanking" class="section hidden">
        <label>Select Bank:</label>
        <select>
            <option>SBI</option>
            <option>HDFC</option>
            <option>ICICI</option>
            <option>Axis Bank</option>
        </select>
    </div>

    <button onclick="makePayment()">Pay Now</button>

    <p id="successMsg"></p>
</div>

<script>
    function showOption(option) {
        document.getElementById('upi').style.display = 'none';
        document.getElementById('card').style.display = 'none';
        document.getElementById('netbanking').style.display = 'none';

        document.getElementById(option).style.display = 'block';
    }

    function makePayment() {
        document.getElementById("successMsg").innerHTML =
            "✅ Payment Successful! Thank you for shopping at KLM Supermarket 🛒";
    }
</script>

</body>
</html>
