<!DOCTYPE html>
<html>
<head>
<title>Dairy - KLM Freshmart</title>
<style>body{text-align:center;font-family:Arial;background:#fffacd}table{margin:auto;border-collapse:collapse}th{background:#ffeb3b;color:black;padding:5px}td{padding:5px;text-align:center}input{width:50px}</style>
</head>
<body>
<h1>Dairy Products 🥛</h1>
<table border="1"><tr><th>Dairy</th><th>Qty</th><th>Price</th><th></th></tr><tbody id="t"></tbody></table>
<h2>Cart</h2><div id="c"></div>
<script>
let c=[],d=[{n:"Milk",p:50},{n:"Curd",p:40},{n:"Cheese",p:150},{n:"Butter",p:120},{n:"Paneer",p:200},{n:"Ghee",p:250},{n:"Cream",p:180},{n:"Yogurt",p:60},{n:"Condensed Milk",p:100},{n:"Flavored Milk",p:90},{n:"Lassi",p:80},{n:"Chocolate Milk",p:100},{n:"Cheese Slices",p:110},{n:"Skimmed Milk",p:55},{n:"Makhana Milk",p:120},{n:"Khoa",p:150},{n:"Dahi Pack",p:45},{n:"Butter Milk",p:50},{n:"Evaporated Milk",p:130},{n:"Toned Milk",p:60}];
let t=document.getElementById('t');
d.forEach(x=>{let tr=document.createElement('tr');let td1=document.createElement('td');td1.innerText=x.n;tr.appendChild(td1);
let td2=document.createElement('td');let inp=document.createElement('input');inp.type='number';inp.value=0.5;inp.min=0.5;inp.step=0.5;td2.appendChild(inp);tr.appendChild(td2);
let td3=document.createElement('td');td3.innerText=x.p*inp.value;tr.appendChild(td3);
inp.oninput=()=>td3.innerText=x.p*inp.value;
let td4=document.createElement('td');let btn=document.createElement('button');btn.innerText='Add';btn.onclick=()=>{c.push({name:x.n,qty:inp.value,price:x.p*inp.value});upd();};td4.appendChild(btn);tr.appendChild(td4);
t.appendChild(tr);});
  function upd(){
 let total=0;
 let h='<table border="1" style="margin:auto"><tr><th>Item</th><th>Qty</th><th>Price</th></tr>';
 c.forEach(i=>{h+=`<tr><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td></tr>`; total+=+i.price;});
 h+=`</table><h3>Total: ₹${total}</h3>
 <button onclick="goPay(${total})">Proceed to Payment</button>`;
 document.getElementById('c').innerHTML=h;
}
function goPay(t){localStorage.setItem("total",t);window.location="payment.html";}
</script>
</body>
</html>
